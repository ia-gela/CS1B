<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams - Maria Angela Navalta</title>

<style>
    body {
        background: url("Images/silk.jpg"); 
        height:100vh;
    .body {

        font-family: Georgia, 'Times New Roman', Times, serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #F3E9DC;

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
     }

     @keyframes move {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
     }

     h1 {
        color: #110702;
        margin-bottom: 40px;
        text-align: center;
        font-size: 2em;
        letter-spacing: 1px;
        text-shadow: 0 0 10px #110702;
     }

     .photo-row{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin-bottom: 40px;
     }

     .photo-box {
        background-color: #F3E9DC(255, 255, 255, 0.1);
        border: 2px solid #110702;
        box-shadow: 0 0 20px #110702(0, 229, 255, 0.4);
        border-radius: 15px;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 250px;
        height: 250px;
        transition: transform 0.3s ease;
     }

     .photo-box:hover {
        transform: scale(1.05);
     }

     .photo-box img{
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        border:3px solid #110702;
        box-shadow: 0 0 15px #110702;
     }

     a {
        margin-top: 10px;
        color: #110702;
        text-decoration: none;
        border: 2px solid #110702;
        padding: 10px 25px;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
     }

     a:hover {
        background-color: #110702;
        color: #F3E9DC;
        box-shadow: 0 0 15px #110702;
     }
</style>
</head>

<body>
     <h1> EXAMS </h1>

     <div class="photo-row">
        <div class="photo-box">
           <img src="midterm1.jpg" alt="Midterm">
        </div>
        <div class="photo-box">
            <img src="finals2" alt="Finals">
        </div>

        <a href="index.html"> ⬅ Back to Portfolio </a>
</body>
</html>
