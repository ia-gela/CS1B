<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exams - Maria Angela Navalta</title>

<style>

body {
    background: url("Images/silk.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: Georgia, 'Times New Roman', Times, serif;
}

h1 {
    color: #110702;
    margin-bottom: 40px;
    text-align: center;
    font-size: 2em;
    text-shadow: 0 0 10px #110702;
}

.upload-container{
    width:90%;
    margin:30px auto;
    display:flex;
    justify-content:space-between;
    gap:40px;
}

.upload-form,
.uploaded-section{
    width:45%;
    border:2px solid #110702;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px #110702;
    background:rgba(243,233,220,0.2);
}

.upload-form h2,
.uploaded-section h2{
    text-align:center;
}

.upload-form label{
    display:block;
    margin-top:10px;
    font-weight:bold;
}

.upload-form input{
    width:100%;
    padding:8px;
    margin-top:5px;
    border:2px solid #110702;
    border-radius:8px;
}

.upload-form button{
    margin-top:15px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:8px;
    background:#110702;
    color:#F3E9DC;
    cursor:pointer;
    font-weight:bold;
}

.activity-card{
    border:2px solid #110702;
    border-radius:10px;
    padding:15px;
    margin-bottom:10px;
    text-align:center;
    font-weight:bold;
}

.activity-card img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #110702;
    margin-top:10px;
}

.photo-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    margin-bottom:40px;
}

.photo-box {
    background-color: rgba(243,233,220,0.2);
    border: 2px solid #110702;
    box-shadow: 0 0 20px rgba(17,7,2,0.4);
    border-radius: 15px;
    padding: 6px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 250px;
    height: 250px;
    transition: transform 0.3s ease;
}

.photo-box:hover {
    transform: scale(1.05);
}

.photo-box img{
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    border: 3px solid #110702;
    box-shadow: 0 0 15px #110702;
}

a {
    margin-top: 10px;
    color: #110702;
    text-decoration: none;
    border: 2px solid #110702;
    padding: 10px 25px;
    border-radius: 8px;
    transition: 0.3s;
    font-weight: bold;
    display:inline-block;
}

a:hover {
    background-color: #110702;
    color: #F3E9DC;
}

.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s ease;
    z-index: 1000;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

.overlay img {
    width: 350px;
    max-width: 80%;
    border-radius: 10px;
    border: 3px solid #110702;
    background: white;
    padding: 10px;
    transform: scale(0.8);
    transition: 0.3s ease;
}

.overlay.active img {
    transform: scale(1);
}

.overlay h2 {
    margin-top: 15px;
    color: #110702;
}

</style>
</head>

<body>

<h1>EXAMS</h1>

<div class="upload-container">

    <div class="upload-form">

        <h2>Upload Exam</h2>

        <label>Exam Name</label>
        <input type="text" id="fileName">

        <label>Upload Image</label>
        <input type="file" id="imageUpload" accept="image/*">

        <button onclick="uploadExam()">Submit</button>

    </div>

    <div class="uploaded-section">

        <h2>Uploaded Exams</h2>
        <div id="examList"></div>

    </div>

</div>

<div class="photo-row">

    <div class="photo-box">
        <img src="Images/MIDTERM.jpeg" alt="Midterm">
    </div>

    <div class="photo-box">
        <img src="Images/FINALS.jpeg" alt="Finals">
    </div>

</div>

<div style="text-align:center;">
    <a href="index.html">⬅ Back to Portfolio</a>
</div>

<div class="overlay" id="overlay">
    <img id="overlayImg">
    <h2 id="overlayTitle"></h2>
</div>

<script>

let examCount = 0;

function uploadExam(){

    const fileName = document.getElementById("fileName").value;
    const imageInput = document.getElementById("imageUpload");

    if(fileName.trim() === ""){
        alert("Please enter an exam name before submitting.");
        return;
    }

    examCount++;

    const card = document.createElement("div");
    card.classList.add("activity-card");

    if(imageInput.files && imageInput.files[0]){

        const reader = new FileReader();

        reader.onload = function(e){
            card.innerHTML =
                "<strong>Exam #" + examCount + "</strong><br><br>" +
                "<img src='" + e.target.result + "'><br><br>" +
                fileName;
        };

        reader.readAsDataURL(imageInput.files[0]);

    } else {

        card.innerHTML =
            "<strong>Exam #" + examCount + "</strong><br>" +
            fileName;
    }

    document.getElementById("examList").appendChild(card);

    document.getElementById("fileName").value = "";
    document.getElementById("imageUpload").value = "";
}
    
const images = document.querySelectorAll(".photo-box img");
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlayImg");
const overlayTitle = document.getElementById("overlayTitle");

images.forEach(img => {
    img.addEventListener("click", () => {
        overlay.classList.add("active");
        overlayImg.src = img.src;
        overlayTitle.textContent = img.alt;
    });
});

overlay.addEventListener("click", () => {
    overlay.classList.remove("active");
});

</script>

</body>
</html>
