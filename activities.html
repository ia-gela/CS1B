<style>
body{
        background: url("Images/silk.jpg"); 
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        font-family: Georgia, 'Times New Roman', Times, serif;
}



h1 {
    color: #110702;
    margin-bottom: 40px;
    text-align: center;
    font-size: 2em;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #110702;
}

.photo-row{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    margin-bottom: 40px;
}

.photo-box {
    background-color: rgba(255, 255, 255, 0.2); 
    border: 2px solid #110702;
    box-shadow: 0 0 20px rgba(17, 7, 2, 0.4); 
    border-radius: 15px;
    padding: 20px;
    display: flex;
    flex-direction: column; 
    justify-content: center;
    align-items: center;
    width: 250px;
    height: 300px; 
    transition: transform 0.3s ease;
}

.photo-box:hover {
    transform: scale(1.05);
}

.photo-box img{
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    border:3px solid #110702;
    box-shadow: 0 0 15px #110702;
}

a {
    margin-top: 10px;
    color: #110702;
    text-decoration: none;
    border: 2px solid #110702;
    padding: 8px 20px;
    border-radius: 8px;
    transition: 0.3s;
    font-weight: bold;
}

a:hover {
    background-color: #110702;
    color: #F3E9DC;
    box-shadow: 0 0 15px #110702;
}
</style>
</head>
