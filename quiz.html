<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizzes Page</title>

<style>

body{
    background: url("Images/silk.jpg"); 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
.body{
    font-family: Georgia, 'Times New Roman', Times, serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #F3E9DC;
}


    

h1{
    color: #110702;
    margin-bottom: 40px;
    text-align: center;
    font-size: 2em;
    letter-spacing: 1px;
    text-shadow: 0 0 10px #110702;
}


}

.upload-container{
    width:90%;
    margin:30px auto;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:50px;
}

.upload-form,
.uploaded-section{
    width:45%;
    border:2px solid #110702;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 15px #110702;
    background:rgba(243,233,220,0.2);
}

.upload-form h2,
.uploaded-section h2{
    text-align:center;
}

.upload-form label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

.upload-form input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:2px solid #110702;
    box-sizing:border-box;
}

.upload-form button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#110702;
    color:#F3E9DC;
    cursor:pointer;
    font-weight:bold;
}

.activity-card{
    border:2px solid #110702;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}

.photo-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:40px;
}

.photo-box img{
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    border:3px solid #110702;
    box-shadow: 0 0 15px #110702;
}
.overlay {
       position: fixed;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       background: rgba(0,0,0,0.7);
       display: flex;
       flex-direction: column;
       justify-content: center;
       align-items: center;
       opacity: 0;
       pointer-events: none;
       transition: 0.3s ease;
       z-index: 1000;
     } 


.overlay.active{
    display:flex;
}

.overlay img{
    max-width:80%;
    max-height:70%;
    border-radius:10px;
}

</style>
</head>

<body>

<h1>QUIZZES</h1>

<div class="upload-container">

    <div class="upload-form">

        <h2>Activity Upload File</h2>

        <label>File Name</label>
        <input type="text" id="fileName" placeholder="Enter file name">

        <label>Upload File</label>
        <input type="file" id="fileUpload">

        <label>Upload Image</label>
        <input type="file" id="imageUpload" accept="image/*">

        <button onclick="uploadActivity()">Submit</button>

    </div>

    <div class="uploaded-section">

        <h2>Uploaded Activity</h2>
        <div id="activityList"></div>

    </div>

</div>

<div class="photo-row">

    <div class="photo-box">
        <img src="Images/Quiz 1.jfif" alt="Quiz 1">
    </div>

    <div class="photo-box">
        <img src="Images/Quiz 2.jfif" alt="Quiz 2">
    </div>

    <div class="photo-box">
        <img src="Images/Quiz 3.jfif" alt="Quiz 3">
    </div>

    <div class="photo-box">
        <img src="Images/Long Quiz.png" alt="Long Quiz">
    </div>

    <div class="photo-box">
        <img src="Images/Carousel.jfif" alt="Carousel">
    </div>

</div>

<a href="index.html">⬅ Back to Portfolio</a>

<div class="overlay" id="overlay">
    <img id="overlayImg">
    <h2 id="overlayTitle"></h2>
</div>

<script>

let activityCount = 0;

function uploadActivity(){

    const fileName = document.getElementById("fileName").value;

    if(fileName.trim() === ""){
        alert("Please enter a file name before submitting.");
        return;
    }

    activityCount++;

    const card = document.createElement("div");
    card.classList.add("activity-card");

    card.innerHTML =
        "<strong>Activity #" + activityCount + "</strong><br>" +
        fileName;

    document.getElementById("activityList").appendChild(card);

    document.getElementById("fileName").value = "";
    document.getElementById("fileUpload").value = "";
    document.getElementById("imageUpload").value = "";
}

const images = document.querySelectorAll(".photo-box img");
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlayImg");
const overlayTitle = document.getElementById("overlayTitle");

images.forEach(img => {
    img.addEventListener("click", () => {
        overlay.classList.add("active");
        overlayImg.src = img.src;
        overlayTitle.textContent = img.alt;
    });
});

overlay.addEventListener("click", () => {
    overlay.classList.remove("active");
});

</script>

</body>
</html>
