<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes - Maria Angela Navalta</title>

<style>
     body{
        background-color: #F3E9DC;
     }
    .body {

        font-family: Georgia, 'Times New Roman', Times, serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #F3E9DC;
        
        background-size: cover;
        background-position: center;
        
     }

     @keyframes move {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
     }

     h1 {
        color: #110702;
        margin-bottom: 40px;
        text-align: center;
        font-size: 2em;
        letter-spacing: 1px;
        text-shadow: 0 0 10px #110702;
     }

     .photo-row{
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin-bottom: 40px;
     }

     .photo-box {
        background-color: #F3E9DC(255, 255, 255, 0.1);
        border: 2px solid #110702;
        box-shadow: 0 0 20px #110702(0, 229, 255, 0.4);
        border-radius: 15px;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 250px;
        height: 250px;
        transition: transform 0.3s ease;
     }

     .photo-box:hover {
        transform: scale(1.05);
     }

     .photo-box img{
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        border:3px solid #110702;
        box-shadow: 0 0 15px #110702;
     }

     a {
        margin-top: 10px;
        color: #110702;
        text-decoration: none;
        border: 2px solid #110702;
        padding: 10px 25px;
        border-radius: 8px;
        transition: 0.3s;
        font-weight: bold;
     }

     a:hover {
        background-color: #110702;
        color: #F3E9DC;
        box-shadow: 0 0 15px #110702;
     }
     
     .overlay {
       position: fixed;
       top: 0;
       left: 0;
       width: 100%;
       height: 100%;
       background: rgba(0,0,0,0.7);
       display: flex;
       flex-direction: column;
       justify-content: center;
       align-items: center;
       opacity: 0;
       pointer-events: none;
       transition: 0.3s ease;
       z-index: 1000;
     } 

     .overlay.active {
       opacity: 1;
       pointer-events: all;
     }

     .overlay img {
       max-width: 90%;
       max-height: 80%;
       border-radius: 10px;
       border: 3px solid #110702;
       box-shadow: 0 0 20px #110702(0, 229, 255, 0.4);
       transform: scale(0.8);
       transition: 0.3s ease;
     }

     .overlay.active img {
       transform: scale(1);
     }

     .overlay h2 {
       margin-top: 15px;
       color: #110702;
       text-shadow: 0 0 20px #110702(0, 229, 255, 0.4);
     };
     }

    .upload-container{
    width:90%;
    margin:30px auto;
    display:flex;
    gap:40px;
}

.upload-form,
.uploaded-section{
    flex:1;
    border:2px solid #110702;
    border-radius:15px;
    padding:25px;
    box-shadow:0 0 15px #110702;
    background:rgba(243,233,220,0.2);
}

.upload-form h2,
.uploaded-section h2{
    text-align:center;
}

.upload-form label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

.upload-form input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:2px solid #110702;
    box-sizing:border-box;
}

.upload-form button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#110702;
    color:#F3E9DC;
    cursor:pointer;
    font-weight:bold;
}

.activity-card{
    border:2px solid #110702;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>QUIZZES</h1>

<!-- Upload Section -->
<div class="upload-container">

    <div class="upload-form">
        <h2>Activity Upload File</h2>

        <label>File Name</label>
        <input type="text" id="fileName" placeholder="Enter your File Name">

        <label>Upload File</label>
        <input type="file" id="fileUpload">

        <label>Upload Image</label>
        <input type="file" id="imageUpload" accept="image/*">

        <button onclick="uploadActivity()">Submit</button>
    </div>

    <div class="uploaded-section">
        <h2>Uploaded Activity</h2>
        <div id="activityList"></div>
    </div>

</div>

<!-- Existing Quiz Gallery -->
<div class="photo-row">
    <div class="photo-box">
        <img src="Images/Quiz 1.jfif" alt="Quiz 1">
    </div>

    <div class="photo-box">
        <img src="Images/Quiz 2.jfif" alt="Quiz 2">
    </div>

    <div class="photo-box">
        <img src="Images/Quiz 3.jfif" alt="Quiz 3">
    </div>

    <div class="photo-box">
        <img src="Images/Long Quiz.png" alt="Long Quiz">
    </div>

    <div class="photo-box">
        <img src="Images/Carousel.jfif" alt="Carousel">
    </div>
</div>

<a href="index.html">⬅ Back to Portfolio</a>

<div class="overlay" id="overlay">
    <img id="overlayImg" src="">
    <h2 id="overlayTitle"></h2>
</div>

<script>

let activityCount = 0;

function uploadActivity() {

    const fileName = document.getElementById("fileName").value;

    if (fileName.trim() === "") {
        alert("Please enter a file name.");
        return;
    }

    activityCount++;

    const activityCard = document.createElement("div");
    activityCard.classList.add("activity-card");

    activityCard.innerHTML =
        "<strong>Activity #" + activityCount + "</strong><br>" +
        fileName;

    document.getElementById("activityList")
            .appendChild(activityCard);

    document.getElementById("fileName").value = "";
    document.getElementById("fileUpload").value = "";
    document.getElementById("imageUpload").value = "";
}

const images = document.querySelectorAll(".photo-box img");
const overlay = document.getElementById("overlay");
const overlayImg = document.getElementById("overlayImg");
const overlayTitle = document.getElementById("overlayTitle");

let isOpen = false;

images.forEach(img => {
    img.addEventListener("click", () => {
        if (!isOpen) {
            overlay.classList.add("active");
            overlayImg.src = img.src;
            overlayTitle.textContent = img.alt;
            isOpen = true;
        }
    });
});

overlay.addEventListener("click", () => {
    overlay.classList.remove("active");
    isOpen = false;
});

</script>

</body>
</html>
