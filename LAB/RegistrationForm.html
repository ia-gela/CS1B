<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
body {
    font-family: Georgia, 'Times New Roman', Times, serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;

    background-color: #F3E9DC;
    background-image: url("caroimages/leopard.jfif");
    background-size: cover;
    background-position: center;
}

.card {
    width: 90%;
    max-width: 32rem;
    background-color: #F3E9DC;
    border: 0.12rem solid #110702;
    border-radius: 1.5rem;
    padding: 1.5rem;
    box-shadow: 0 0 1rem rgba(17, 7, 2, 0.3);
}

h1 {
    text-align: center;
    color: #110702;
}

label {
    margin-top: 0.8rem;
    color: #110702;
}

input, select {
    width: 100%;
    padding: 0.5rem;
    margin-top: 0.3rem;
    border-radius: 0.5rem;
    border: 0.08rem solid #110702;
    background-color: #F3E9DC;
    color: #110702;
    font-family: inherit;
}

input::placeholder {
    color: #8a7f76;
}

.radio-group {
    margin-top: 0.5rem;
}

.radio-group input {
    width: auto;
    margin-right: 0.3rem;
}

.checkbox-group {
    margin-top: 0.5rem;
}

.checkbox-label {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    color: #110702;
}

.checkbox-label input {
    width: auto;
    margin: 0;
}

button {
    padding: 0.4rem;
    border-radius: 0.5rem;
    border: 0.10rem solid #110702;
    cursor: pointer;
    font-family: inherit;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
}

.primary-btn {
    background-color: #110702;
    color: #F3E9DC;
}

.secondary-btn {
    background-color: transparent;
    color: #110702;
}

.small-btn {
    width: 50%;
    margin-top: 0.5rem;
    background-color: #110702;
    color: #F3E9DC;
}

 .back-container {
    display: flex;
    justify-content: center;
    margin-top: 40px;
    margin-bottom: 20px;
 }

.back-btn {
    align-items: center ;
    display: inline-block;
    margin: 10px;
    padding: 5px 8px;
    border: 2px solid #110702;
    border-radius: 8px;
    text-decoration: none;
    color: #110702;
    font-weight: bold;
    transition: 0.3s;
    font-family: Georgia, 'Times New Roman', Times, serif;
}

.back-btn:hover {
    background-color: #110702;
    color: #F3E9DC;
}
</style>
</head>

<body>

<div class="card">

<h1>Registration Form</h1>

<label>Full Name</label>
<input type="text" id="fullName" placeholder="Enter Full Name">

<label>Email</label>
<input type="text" id="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" id="password" placeholder="Enter Password">

<label>Confirm Password</label>
<input type="password" id="confirm" placeholder="Confirm Password">

<button type="button" class="small-btn" onclick="togglePassword()">
Show / Hide Password<br>
</button>

<label><br>Age</label><br>
<input type="number" id="age" placeholder="Enter Age">

<label>Gender</label>
<div class="radio-group">
    <input type="radio" name="gender" id="male"> Male
    <input type="radio" name="gender" id="female"> Female
    <input type="radio" name="gender" id="other"> Other
</div>

<label>Country</label>
<select id="country">
          <option value="">-- select a country --</option>
          <option value="USA">United States</option>
          <option value="Canada">Canada</option>
          <option value="UK">United kingdom</option>
          <option value="Australia">Australia</option>
          <option value="India">India</option>
          <option value="Philippines">Philippines</option>
          <option value="Other">Other</option>
</select>

<div class="checkbox-group">
    <label class="checkbox-label">
        <input type="checkbox" id="agree">
        I agree to Terms & Privacy
    </label>
</div>

<div class="buttons">
    <button type="button" class="secondary-btn" onclick="clearForm()">Clear</button>
    <button type="button" class="primary-btn" onclick="RegistrationSummary()">Register</button>
    <a href="activities.html" class="back-btn">⬅ Back to Activities</a>
</div>

</div>

<script>

function togglePassword() {
    let pass = document.getElementById("password");
    let confirm = document.getElementById("confirm");

    pass.type = pass.type === "password" ? "text" : "password";
    confirm.type = confirm.type === "password" ? "text" : "password";
}

function RegistrationSummary() {

    let name = document.getElementById("fullName").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;
    let age = document.getElementById("age").value;
    let country = document.getElementById("country").value;

    let gender = "";
    if (document.getElementById("male").checked) gender = "Male";
    else if (document.getElementById("female").checked) gender = "Female";
    else if (document.getElementById("other").checked) gender = "Other";

    if (password !== confirm) {
        alert("Passwords do not match.");
        return;
    }

    if (!document.getElementById("agree").checked) {
        alert("Please accept the terms.");
        return;
    }

    alert(
        "REGISTRATION SUMMARY\n" +
        "\n" +
        "Full Name: " + name + "\n" +
        "Email: " + email + "\n" +
        "Age: " + age + "\n" +
        "Gender: " + gender + "\n" +
        "Country: " + country
    );
}

function clearForm() {
    document.querySelectorAll("input").forEach(el => {
        if (el.type === "radio" || el.type === "checkbox") {
            el.checked = false;
        } else {
            el.value = "";
        }
    });
    document.getElementById("country").value = "";
}

</script>

</body>
</html>
