<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My carousel · example</title>
    <style>
        /* just the basics — no extra decorations */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          
        }

        body {
            background:url("https://uploads.onecompiler.io/44fe8p69c/44fe8h693/tulips.jpg");
            font-family: Georgia, 'Times New Roman', Times, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: #EFE9E3;
            border-radius: 2rem;
            padding: 2rem 1.5rem 2.5rem 1.5rem;
            box-shadow: 0 15px 30px #F9F8F6;
            text-align: center;
        }

        h2 {
            color: #2c2152;
            margin-bottom: 1.8rem;
            font-weight: 500;
            font-size: 2rem;
        }

        /* ---------- SIMPLE CAROUSEL ---------- */
        .carousel {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            scroll-snap-type: x mandatory;
            padding: 0.5rem 0.2rem 1.5rem 0.2rem;
            /* hide scrollbar if you want cleaner look (optional) */
            scrollbar-width: thin;
            scrollbar-color: #C9B59C #D9CFC7;
            
        }

        /* for Chrome/Safari */
        .carousel::-webkit-scrollbar {
            height: 8px;
        }
        .carousel::-webkit-scrollbar-track {
            background: #C9B59C ;
            border-radius: 20px;
        }
        .carousel::-webkit-scrollbar-thumb {
            background: #C9B59C;
            border-radius: 20px;
        }

        .carousel-item {
            scroll-snap-align: start;
            flex: 0 0 auto;
            width: 220px;
            height: 150px;
            background: #C9B59C;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: bold;
            box-shadow: 0 8px 12px #F9F8F6;
            border: 3px solid white;
        }

        /* make images fit (if you use real images) */
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 1.4rem;
        }

        .note button {
            margin-top: 1.5rem;
            color: black;
            background: #F9F8F6;
            padding: 0.8rem 1rem ;
            border-radius: 2rem;
            font-size: 1rem;
            box-shadow: 0 0 15px #F9F8F6 ;
            font-family:Georgia, 'Times New Roman', Times, serif;
        }

        .back-container {
           display: flex;
           justify-content: center;
           margin-top: 40px;
           margin-bottom: 20px;
        }

        .back-btn {
            display: inline-block;
            margin: 20px;
            padding: 10px 18px;
            border: 2px solid #110702;
            border-radius: 8px;
            text-decoration: none;
            color: #110702;
            font-weight: bold;
            transition: 0.3s;
             font-family: Georgia, 'Times New Roman', Times, serif;
        }

        .back-btn:hover { 
           background-color: #110702;
           color: #F3E9DC;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2> Puppy carousel</h2>

        <!-- === CAROUSEL (only HTML + CSS) === -->
        <div class="carousel">
            <!-- slide 1 (using colored divs with emoji – you can replace with <img> ) -->
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/cutie.jpg" id="item-1"></div>
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/flower.jpg" id="item-2"></div>
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/glasses.jpg" id="item-3"></div>
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/cap.jpg" id="item-4"></div>
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/dino.jpg" id="item-5"></div>
            <div class="carousel-item"><img src="https://uploads.onecompiler.io/44fe8p69c/44fe8h693/bee.jpg" id="item-6"></div>
        </div>

        <div class="note">
            <a href="#item-1"> <button>Flippy</button></a>
            <a href="#item-2"> <button>Flower</button></a>
            <a href="#item-3"> <button>Glasses</button></a>
            <a href="#item-4"> <button>cap</button></a>
            <a href="#item-5"> <button>Dino</button></a>
            <a href="#item-6"> <button>Bee</button></a>
        </div>

        <!-- short explanation -->
        <p style="margin-top: 1.5rem; color:#3c2d66; background:#C9B59C; padding:0.6rem; border-radius:3rem;">
             <code><marquee>MARIA ANGELA P. NAVALTA | BSCS 1B | ITEC50</marquee></code>
        </p>
        <a href="../activities.html" class="back-btn">⬅ Back to Activities</a>
        

    </div>
</body>
</html>
